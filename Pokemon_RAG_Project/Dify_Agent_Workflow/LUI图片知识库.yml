    - data:
        classes:
        - id: '1'
          label: CLASS 1
          name: 日常聊天
        - id: '2'
          label: CLASS 2
          name: 知识库图片搜索
        instruction: "根据用户输入的自然语言:，将其精准分类到以下两类之一：\n\n- **CLASS 1 (日常聊天)**：用户在进行日常问候、打招呼、闲聊、表达感谢，或者提问与宝可梦图鉴完全无关的话题。\n\
          \  - *典型示例*：“你好”、“哈喽”、“你是谁”、“谢谢你”、“今天星期几”。\n\n- **CLASS 2 (知识库图片搜索)**：用户想要查询某只特定的宝可梦、输入了编号、或者通过颜色、外观、特征和属性来寻找、描述和要求展示宝可梦图片。\n\
          \  - *典型示例*：“0001号图片是啥”、“给我找几只黄色的宝可梦”、“帮我找一下背上长了种子的绿色小恐龙”、“妙蛙种子的照片有吗”。\n\
          \n请根据用户问题的真实语义重心，直接输出匹配度最高的分类（CLASS 1 或 CLASS 2）。/"
